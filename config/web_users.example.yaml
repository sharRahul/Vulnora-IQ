# Example Web UI authentication configuration.
#
# Copy this file to config/web_users.yaml and replace token hashes with real values.
# In production, prefer setting env vars instead:
#   VULNORAIQ_AUTH_ENABLED=true
#   VULNORAIQ_ADMIN_TOKEN=<strong-random-token>
#   VULNORAIQ_ANALYST_TOKEN=<analyst-token>
#   VULNORAIQ_VIEWER_TOKEN=<viewer-token>
#
# Token hashes below are SHA-256 of placeholder values for development only.
# Replace with real hashes for any non-development deployment.

auth:
  enabled: true
  default_role: viewer
  header_name: X-VulnoraIQ-Token
users:
  - username: admin
    role: admin
    # hash of "replace-this-admin-token"
    token_hash: "REPLACE_WITH_REAL_SHA256_HEX"
    status: active
  - username: analyst
    role: analyst
    # hash of "replace-this-analyst-token"
    token_hash: "REPLACE_WITH_REAL_SHA256_HEX"
    status: active
roles:
  viewer:
    permissions:
      - view_scans
      - download_artifacts
  analyst:
    inherits:
      - viewer
    permissions: []
  admin:
    inherits:
      - analyst
    permissions:
      - start_configured_scan
      - manage_runtime
