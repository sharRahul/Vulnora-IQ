name: Python CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run tests
        run: pytest

      - name: Run demo assessment smoke test
        run: |
          python scripts/run_scan.py --target demo --profile baseline \
            --output reports/output/demo-report.md \
            --json-output reports/output/demo-report.json \
            --dashboard-output reports/output/demo-dashboard.md

      - name: Upload demo reports
        uses: actions/upload-artifact@v4
        with:
          name: llm-vapt-demo-reports-${{ matrix.python-version }}
          path: reports/output/
